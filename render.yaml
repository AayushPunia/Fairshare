# render.yaml — Render Blueprint for one-click deploy
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: fairshare
    runtime: python
    buildCommand: ./build.sh
    startCommand: cd backend && gunicorn config.wsgi --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://fairshare.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://fairshare.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: fairshare-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.13.5"
      - key: NODE_VERSION
        value: "18"

databases:
  - name: fairshare-db
    plan: free
    databaseName: fairshare
    user: fairshare
